# Crowdin config for the Cryon core plugin.
#
# Source is the bundled English bundle; translations land beside it as <locale>.properties and are
# auto-registered at runtime by LangScanner (no code, no manifest). `%locale_with_underscore%` yields
# the en_US / de_DE filename style the loader parses. Credentials come from env — see TRANSLATING.md.
project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
preserve_hierarchy: true

files:
    -   source: /paper/src/main/resources/lang/en_US.properties
        translation: /paper/src/main/resources/lang/%locale_with_underscore%.properties
