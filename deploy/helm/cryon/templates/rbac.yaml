# ServiceAccount + Role for allocating game servers. Used by the matchmaker/allocator (proxy-side or
# a dedicated service) to create GameServerAllocations for ephemeral matches and watch fleet state.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: cryon-allocator
    namespace: { { .Values.namespace } }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: cryon-allocator
    namespace: { { .Values.namespace } }
rules:
    -   apiGroups: [ "allocation.agones.dev" ]
        resources: [ "gameserverallocations" ]
        verbs: [ "create" ]
    -   apiGroups: [ "agones.dev" ]
        resources: [ "gameservers", "fleets" ]
        verbs: [ "get", "list", "watch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: cryon-allocator
    namespace: { { .Values.namespace } }
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: cryon-allocator
subjects:
    -   kind: ServiceAccount
        name: cryon-allocator
        namespace: { { .Values.namespace } }
