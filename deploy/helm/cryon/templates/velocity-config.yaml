apiVersion: v1
kind: ConfigMap
metadata:
    name: cryon-velocity-config
    namespace: { { .Values.namespace } }
data:
    config.yml: |
        database:
            enabled: true
            host: "{{ .Values.postgres.host }}"
            port: { { .Values.postgres.port } }
            database: "{{ .Values.postgres.database }}"
            username: "{{ .Values.postgres.username }}"
            password: "__DB_PASSWORD__"
            max-pool-size: 10
        redis:
            enabled: true
            uri: "{{ .Values.redis.uri }}"
        network:
            registry-enabled: true
            heartbeat-seconds: 5
        maintenance:
            default-message: "The network is under maintenance."
            ping-protocol: -1
    velocity.toml: |
        config-version = "2.7"
        bind = "0.0.0.0:25565"
        motd = "Cryon"
        show-max-players = 1000
        online-mode = true
        player-info-forwarding-mode = "modern"
        # The entrypoint writes the shared secret here from the forwarding Secret.
        forwarding-secret-file = "forwarding.secret"
        [servers]
        # Backends are registered dynamically by the Cryon loader from the server registry; leave empty.
        [forced-hosts]
        [advanced]
        [query]
        enabled = false
