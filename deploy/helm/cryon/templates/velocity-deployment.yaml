apiVersion: apps/v1
kind: Deployment
metadata:
    name: cryon-velocity
    namespace: { { .Values.namespace } }
    labels:
        app.kubernetes.io/name: cryon
        app.kubernetes.io/component: proxy
spec:
    replicas: { { .Values.proxy.replicas } }
    selector:
        matchLabels:
            app.kubernetes.io/component: proxy
    template:
        metadata:
            labels:
                app.kubernetes.io/name: cryon
                app.kubernetes.io/component: proxy
        spec:
            serviceAccountName: cryon-allocator
            containers:
                -   name: velocity
                    image: { { .Values.image.velocity } }
                    imagePullPolicy: { { .Values.image.pullPolicy } }
                    ports:
                        -   name: minecraft
                            containerPort: 25565
                            protocol: TCP
                    resources:
  { { toYaml .Values.proxy.resources | indent 12 } }
env:
    -   name: CRYON_DB_PASSWORD
        valueFrom:
            secretKeyRef:
                name: { { .Values.secrets.postgres } }
                key: password
    -   name: CRYON_FORWARDING_SECRET
        valueFrom:
            secretKeyRef:
                name: { { .Values.secrets.forwarding } }
                key: secret
volumeMounts:
    -   name: cryon-config
        mountPath: /cryon-config
        readOnly: true
  { { - if .Values.geyser.enabled } }
-   name: floodgate
    mountPath: /floodgate
    readOnly: true
  { { - end } }
volumes:
    -   name: cryon-config
        configMap:
            name: cryon-velocity-config
  { { - if .Values.geyser.enabled } }
-   name: floodgate
    secret:
        secretName: { { .Values.secrets.floodgate } }
  { { - end } }
