apiVersion: v1
kind: Service
metadata:
    name: cryon-velocity
    namespace: { { .Values.namespace } }
    labels:
        app.kubernetes.io/name: cryon
        app.kubernetes.io/component: proxy
spec:
    type: { { .Values.proxy.serviceType } }
    # Keep a Bedrock/Java player pinned to one proxy for their session.
    sessionAffinity: ClientIP
    selector:
        app.kubernetes.io/component: proxy
    ports:
        -   name: minecraft
            port: { { .Values.proxy.port } }
            targetPort: 25565
            protocol: TCP
