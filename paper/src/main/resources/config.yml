# Set true on live/production servers. Disables developer conveniences — currently the module
# hot-reload watcher (see modules.auto-reload). Does not affect the /cryon load|unload|scan
# commands, which always work.
production: false

modules:
    # Watch plugins/Cryon/modules/ and automatically load, reload, and unload feature jars at
    # runtime as they're added, replaced, or deleted — no /cryon command needed. Intended for dev
    # iteration. Defaults to the opposite of `production` (on in dev, off in prod); uncomment to
    # override. Feature jars are loaded from private copies, so the originals here are never locked
    # and can be freely swapped while running.
    auto-reload: true

# This server's family (the interchangeable pool it belongs to, e.g. skyblock or hub). Also the
# scope name server-scoped feature flags apply to, so a flag kills the whole pool at once. Kept as a
# legacy alias for network.family below; prefer setting network.family.
server-name: local

# Network / sharding. This server registers itself in the server registry and heartbeats its live
# player count, so proxies can route to it and an orchestrator can scale the pool. All values are
# env-first (a Kubernetes pod needs no baked config): CRYON_NETWORK_MODE, CRYON_SERVER_FAMILY,
# CRYON_INSTANCE_ID (or HOSTNAME), CRYON_INSTANCE_ADDRESS, CRYON_INSTANCE_PORT.
network:
    # Which of the two deployment shapes this server is meant to be:
    #
    #   single    — this server is the whole family. Nothing needs to leave the process, so redis is
    #               optional and everything below still works: the registry holds one instance (this
    #               one) and a flag toggle reaches its only audience.
    #   instanced — one of N interchangeable instances of `family` below, sharing players. Redis and
    #               the database are then REQUIRED: without them each instance runs as its own island
    #               and they will silently disagree.
    #
    # This declares intent; it does not switch behaviour. What actually decides whether state crosses
    # processes is redis.enabled. Declaring the mode is what lets the core check the two against each
    # other and complain loudly when they disagree — see /cryon network.
    mode: single

    registry-enabled: true
    # The interchangeable pool. Blank falls back to server-name above, then "local".
    family: ""
    # Unique per process. Blank falls back to CRYON_INSTANCE_ID, then HOSTNAME, then a generated id.
    instance-id: ""
    # The address a proxy dials to reach this server. Blank falls back to 127.0.0.1.
    address: ""
    # 0 falls back to the Paper server port.
    port: 0
    # 0 falls back to the Paper server max-players.
    max-players: 0
    heartbeat-seconds: 5

    # Agones (Kubernetes game-server orchestration). Auto-detected via the injected sidecar env, so
    # these only take effect inside an Agones-managed pod; elsewhere they are ignored.
    agones:
        health-seconds: 5
        # Persistent shards: request Shutdown once empty for empty-grace-seconds, so the fleet can
        # shrink. Guarded so it never kills the last min-instances of the family. Off by default,
        # which is correct for singleton hubs and for ephemeral matches (they shut down on match end).
        shutdown-when-empty: false
        empty-grace-seconds: 60
        min-instances: 1

# Storage and transport.
#
# database — where state is written down. Needed for anything that must survive a restart, or follow
#            a player between instances: feature flag overrides, player language, module data.
# redis    — how far a message travels. On, state is shared with every other process on the network.
#            Off, it stays in this JVM, which is the whole network when network.mode is `single`.
#            The API is identical either way, so features never branch on it.
database:
    enabled: false
    # Backend: postgresql, mysql, or h2. With h2 the DB is an embedded local file (`database` below is
    # its path, host/port ignored) — zero-setup, but local to this process, not shared across servers.
    type: mysql
    host: localhost
    # Leave the port at the backend default (postgresql 5432, mysql 3306) or set your own.
    port: 3306
    database: cryon
    username: cryon
    password: ""
    max-pool-size: 10

redis:
    enabled: false
    # redis://[:password@]host:port/db
    uri: "redis://localhost:6379/0"
