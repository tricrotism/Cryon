production: false

modules:
    auto-reload: true

server-name: prison

network:
    mode: instanced
    registry-enabled: true
    family: prison
    instance-id: paper2
    address: 127.0.0.1
    port: 25567
    max-players: 0
    heartbeat-seconds: 5
    agones:
        health-seconds: 5
        shutdown-when-empty: false
        empty-grace-seconds: 60
        min-instances: 1

database:
    enabled: true
    host: 127.0.0.1
    port: 5433
    database: cryon
    username: cryon
    password: ""
    max-pool-size: 10

redis:
    enabled: true
    uri: "redis://localhost:6379/0"
